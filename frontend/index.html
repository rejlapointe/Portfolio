<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 { font-size: 1.4rem; font-weight: 600; color: #f8fafc; }

    #total-card {
      background: #1e2433;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 16px 24px;
      text-align: right;
    }
    #total-card .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; }
    #total-card .amount { font-size: 1.8rem; font-weight: 700; color: #38bdf8; }

    #refresh-btn {
      background: #1e40af;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background .2s;
    }
    #refresh-btn:hover { background: #2563eb; }
    #refresh-btn:disabled { background: #374151; cursor: default; }

    #last-updated { font-size: 0.75rem; color: #64748b; margin-top: 4px; }

    .owner-section { margin-bottom: 32px; }
    .owner-title {
      font-size: 1rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .account-card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .account-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
      background: #1e2433;
    }
    .account-header:hover { background: #253047; }

    .account-name { font-weight: 600; font-size: 0.95rem; }
    .account-number { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
    .account-balance { font-size: 1.1rem; font-weight: 700; color: #4ade80; }
    .chevron { color: #64748b; font-size: 0.8rem; transition: transform .2s; }
    .chevron.open { transform: rotate(180deg); }

    .positions-table { width: 100%; display: none; }
    .positions-table.open { display: table; }

    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      background: #151922;
      color: #64748b;
      font-weight: 500;
      text-align: left;
      padding: 10px 18px;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: .05em;
    }
    th.right, td.right { text-align: right; }
    td { padding: 10px 18px; border-top: 1px solid #1e2433; color: #cbd5e1; }
    tr:hover td { background: #1e2433; }

    .ticker { font-weight: 600; color: #f8fafc; }
    .usd { color: #fbbf24; font-size: 0.7rem; margin-left: 4px; }

    #error { color: #f87171; text-align: center; padding: 40px; display: none; }
    #loading { text-align: center; padding: 60px; color: #64748b; display: none; }

    .table-card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      overflow: hidden;
    }

    @media (max-width: 480px) {
      th.hide-mobile, td.hide-mobile { display: none; }
      .amount { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Portfolio Dashboard</h1>
    <div id="last-updated"></div>
  </div>
  <div id="total-card">
    <div class="label">Total Portfolio</div>
    <div class="amount" id="total-value">—</div>
  </div>
  <button id="refresh-btn" onclick="load()">Refresh</button>
</header>

<div id="loading">Loading portfolio data...</div>
<div id="error">Failed to load data. Is the server running?</div>
<div id="accounts"></div>

<script>
  async function load() {
    const btn = document.getElementById('refresh-btn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const container = document.getElementById('accounts');

    btn.disabled = true;
    btn.textContent = 'Loading…';
    loading.style.display = 'block';
    error.style.display = 'none';
    container.innerHTML = '';

    try {
      const res = await fetch('/api/portfolio');
      if (!res.ok) throw new Error(res.statusText);
      const data = await res.json();
      render(data);
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString();
    } catch (e) {
      error.style.display = 'block';
    } finally {
      loading.style.display = 'none';
      btn.disabled = false;
      btn.textContent = 'Refresh';
    }
  }

  function fmt(amount, currency) {
    return new Intl.NumberFormat('en-CA', {
      style: 'currency', currency: currency || 'CAD', maximumFractionDigits: 2
    }).format(amount);
  }

  function render(data) {
    document.getElementById('total-value').textContent = fmt(data.total_cad, 'CAD');

    const COLS = ['Rej RRSP', 'Rej TFSA', 'Kaz RRSP', 'Kaz TFSA'];

    function acctLabel(acc) {
      const name = acc.name.toUpperCase();
      const type = name.includes('RRSP') ? 'RRSP' : name.includes('TFSA') ? 'TFSA' : acc.name;
      return `${acc.owner} ${type}`;
    }

    const combined = {};
    for (const acc of data.accounts) {
      const label = acctLabel(acc);
      for (const pos of acc.positions) {
        if (!combined[pos.ticker]) {
          combined[pos.ticker] = { description: pos.description, currency: pos.currency, price: pos.price, qtys: {} };
        }
        combined[pos.ticker].qtys[label] = (combined[pos.ticker].qtys[label] || 0) + pos.units;
      }
    }

    const rows = Object.entries(combined).sort((a, b) => {
      const tot = e => Object.values(e[1].qtys).reduce((s, u) => s + u, 0) * (e[1].price || 0);
      return tot(b) - tot(a);
    });

    let html = `<div class="table-card"><table><thead><tr>
      <th>Ticker</th>
      <th>Description</th>
      ${COLS.map(c => `<th class="right">${c}</th>`).join('')}
      <th class="right">Total Qty</th>
      <th class="right">Price</th>
      <th class="right">Value</th>
    </tr></thead><tbody>`;

    for (const [ticker, info] of rows) {
      const dec = info.currency === 'USD' ? 3 : 0;
      const fmtQty = q => q ? q.toFixed(dec) : '—';
      const totalQty = Object.values(info.qtys).reduce((s, u) => s + u, 0);
      const totalValue = totalQty * (info.price || 0);
      html += `<tr>
        <td class="ticker">${ticker}${info.currency === 'USD' ? '<span class="usd">USD</span>' : ''}</td>
        <td>${info.description}</td>
        ${COLS.map(c => `<td class="right">${fmtQty(info.qtys[c])}</td>`).join('')}
        <td class="right">${totalQty.toFixed(dec)}</td>
        <td class="right">${fmt(info.price, info.currency)}</td>
        <td class="right">${fmt(totalValue, info.currency)}</td>
      </tr>`;
    }

    html += `</tbody></table></div>`;
    document.getElementById('accounts').innerHTML = html;
  }

  load();
</script>
</body>
</html>
