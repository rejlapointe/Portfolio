<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Dashboard</title>
  <link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css" rel="stylesheet">
  <style>
    .tabulator { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 12px; font-size: 0.82rem; color: #cbd5e1; }
    .tabulator .tabulator-header { background: #151922; border-bottom: 1px solid #2d3748; border-radius: 12px 12px 0 0; }
    .tabulator .tabulator-header .tabulator-col { background: #151922; border-right: 1px solid #2d3748; color: #64748b; font-size: 0.7rem; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
    .tabulator .tabulator-header .tabulator-col.tabulator-sortable:hover { background: #1e2433; }
    .tabulator .tabulator-header .tabulator-col .tabulator-col-content { padding: 10px 18px; }
    .tabulator-row { background: #1a1f2e; border-bottom: 1px solid #1e2433; color: #cbd5e1; }
    .tabulator-row:hover, .tabulator-row.tabulator-row-even:hover { background: #1e2433 !important; }
    .tabulator-row.tabulator-row-even { background: #1a1f2e; }
    .tabulator-row .tabulator-cell { border-right: none; padding: 10px 18px; color: #cbd5e1; }
    .tabulator .tabulator-header .tabulator-col .tabulator-arrow { border-top-color: #4a5568; border-bottom-color: #4a5568; }
    .tabulator-col-title { color: #64748b; }
  </style>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 { font-size: 1.4rem; font-weight: 600; color: #f8fafc; }

    #total-card {
      background: #1e2433;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 16px 24px;
      text-align: right;
    }
    #total-card .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; }
    #total-card .amount { font-size: 1.8rem; font-weight: 700; color: #38bdf8; }

    #refresh-btn {
      background: #1e40af;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background .2s;
    }
    #refresh-btn:hover { background: #2563eb; }
    #refresh-btn:disabled { background: #374151; cursor: default; }

    #last-updated { font-size: 0.75rem; color: #64748b; margin-top: 4px; }

    .owner-section { margin-bottom: 32px; }
    .owner-title {
      font-size: 1rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .account-card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .account-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
      background: #1e2433;
    }
    .account-header:hover { background: #253047; }

    .account-name { font-weight: 600; font-size: 0.95rem; }
    .account-number { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
    .account-balance { font-size: 1.1rem; font-weight: 700; color: #4ade80; }
    .chevron { color: #64748b; font-size: 0.8rem; transition: transform .2s; }
    .chevron.open { transform: rotate(180deg); }

    .positions-table { width: 100%; display: none; }
    .positions-table.open { display: table; }

    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      background: #151922;
      color: #64748b;
      font-weight: 500;
      text-align: left;
      padding: 10px 18px;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: .05em;
    }
    th.right, td.right { text-align: right; }
    td { padding: 10px 18px; border-top: 1px solid #1e2433; color: #cbd5e1; }
    tr:hover td { background: #1e2433; }

    .ticker { font-weight: 600; color: #f8fafc; }
    .usd { color: #fbbf24; font-size: 0.7rem; margin-left: 4px; }

    #error { color: #f87171; text-align: center; padding: 40px; display: none; }
    #loading { text-align: center; padding: 60px; color: #64748b; display: none; }

    #rate-card {
      background: #1e2433;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 12px 20px;
      text-align: center;
    }
    #rate-card .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    #usdcad-rate {
      background: transparent;
      border: none;
      border-bottom: 1px solid #4a5568;
      color: #fbbf24;
      font-size: 1.2rem;
      font-weight: 700;
      width: 70px;
      text-align: center;
      outline: none;
    }

    .table-card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      overflow: hidden;
    }

    @media (max-width: 480px) {
      th.hide-mobile, td.hide-mobile { display: none; }
      .amount { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Portfolio Dashboard</h1>
    <div id="last-updated"></div>
  </div>
  <div id="total-card">
    <div class="label">Total Portfolio</div>
    <div class="amount" id="total-value">—</div>
  </div>
  <div id="rate-card">
    <div class="label">USD/CAD</div>
    <input id="usdcad-rate" type="number" step="0.001" value="1.38">
  </div>
  <button id="refresh-btn" onclick="load()">Refresh</button>
</header>

<div id="loading">Loading portfolio data...</div>
<div id="error">Failed to load data. Is the server running?</div>
<div id="accounts"></div>

<script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
<script>
  let portfolioTable = null;

  async function load() {
    const btn = document.getElementById('refresh-btn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');

    btn.disabled = true;
    btn.textContent = 'Loading…';
    loading.style.display = 'block';
    error.style.display = 'none';
    if (portfolioTable) { portfolioTable.destroy(); portfolioTable = null; }

    try {
      const res = await fetch('/api/portfolio');
      if (!res.ok) throw new Error(res.statusText);
      const data = await res.json();
      render(data);
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString();
    } catch (e) {
      error.style.display = 'block';
    } finally {
      loading.style.display = 'none';
      btn.disabled = false;
      btn.textContent = 'Refresh';
    }
  }

  function fmt(amount, currency, decimals = 2) {
    return new Intl.NumberFormat('en-CA', {
      style: 'currency', currency: currency || 'CAD', maximumFractionDigits: decimals, minimumFractionDigits: decimals
    }).format(amount);
  }

  function render(data) {
    document.getElementById('total-value').textContent = fmt(data.total_cad, 'CAD', 0);

    const COLS = ['Rej RRSP', 'Rej TFSA', 'Kaz RRSP', 'Kaz TFSA'];
    const FIELDS = ['rejRRSP', 'rejTFSA', 'kazRRSP', 'kazTFSA'];

    function acctLabel(acc) {
      const name = acc.name.toUpperCase();
      const type = name.includes('RRSP') ? 'RRSP' : name.includes('TFSA') ? 'TFSA' : acc.name;
      return `${acc.owner} ${type}`;
    }

    const rate = parseFloat(document.getElementById('usdcad-rate').value) || 1.38;
    const toCAD = info => info.currency === 'USD' ? (info.price || 0) * rate : (info.price || 0);

    const combined = {};
    for (const acc of data.accounts) {
      const label = acctLabel(acc);
      for (const pos of acc.positions) {
        if (!combined[pos.ticker]) {
          combined[pos.ticker] = { description: pos.description, currency: pos.currency, price: pos.price, qtys: {} };
        }
        combined[pos.ticker].qtys[label] = (combined[pos.ticker].qtys[label] || 0) + pos.units;
      }
    }

    const tableData = Object.entries(combined).map(([ticker, info]) => {
      const totalQty = Object.values(info.qtys).reduce((s, u) => s + u, 0);
      const cp = toCAD(info);
      const row = { ticker, isUSD: info.currency === 'USD', description: info.description, currency: info.currency, totalQty, nativePrice: info.price, cadPriceVal: cp, value: totalQty * cp };
      COLS.forEach((col, i) => { row[FIELDS[i]] = info.qtys[col] || null; });
      return row;
    });

    const qtyFmt = cell => {
      const { isUSD } = cell.getRow().getData();
      const v = cell.getValue();
      return v ? v.toFixed(isUSD ? 3 : 0) : '';
    };

    portfolioTable = new Tabulator('#accounts', {
      data: tableData,
      layout: 'fitColumns',
      initialSort: [{ column: 'value', dir: 'desc' }],
      columns: [
        {
          title: 'Ticker', field: 'ticker', width: 100,
          formatter: cell => {
            const { isUSD } = cell.getRow().getData();
            return isUSD ? `${cell.getValue()} <span class="usd">USD</span>` : cell.getValue();
          }
        },
        { title: 'Description', field: 'description', widthGrow: 3 },
        ...COLS.map((col, i) => ({
          title: col, field: FIELDS[i],
          hozAlign: 'right', headerHozAlign: 'right', sorter: 'number', formatter: qtyFmt,
        })),
        {
          title: 'Total Qty', field: 'totalQty',
          hozAlign: 'right', headerHozAlign: 'right', sorter: 'number',
          formatter: cell => { const { isUSD } = cell.getRow().getData(); return cell.getValue().toFixed(isUSD ? 3 : 0); }
        },
        {
          title: 'Native Price', field: 'nativePrice',
          hozAlign: 'right', headerHozAlign: 'right', sorter: 'number',
          formatter: cell => fmt(cell.getValue(), cell.getRow().getData().currency),
        },
        {
          title: 'CAD Price', field: 'cadPriceVal',
          hozAlign: 'right', headerHozAlign: 'right', sorter: 'number',
          formatter: cell => fmt(cell.getValue(), 'CAD'),
        },
        {
          title: 'Value', field: 'value',
          hozAlign: 'right', headerHozAlign: 'right', sorter: 'number',
          formatter: cell => fmt(cell.getValue(), 'CAD', 0),
        },
      ],
    });
  }

  load();
</script>
</body>
</html>
