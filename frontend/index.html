<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Dashboard</title>
  <link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css" rel="stylesheet">
  <style>
    .tabulator { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 12px; font-size: 0.82rem; color: #cbd5e1; }
    .tabulator .tabulator-header { background: #151922; border-bottom: 1px solid #2d3748; border-radius: 12px 12px 0 0; }
    .tabulator .tabulator-header .tabulator-col { background: #151922; border-right: 1px solid #2d3748; color: #64748b; font-size: 0.7rem; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
    .tabulator .tabulator-header .tabulator-col.tabulator-sortable:hover { background: #1e2433; }
    .tabulator .tabulator-header .tabulator-col .tabulator-col-content { padding: 10px 18px; }
    .tabulator-row { background: #1a1f2e; border-bottom: 1px solid #1e2433; color: #cbd5e1; }
    .tabulator-row:hover, .tabulator-row.tabulator-row-even:hover { background: #1e2433 !important; }
    .tabulator-row.tabulator-row-even { background: #1a1f2e; }
    .tabulator-row .tabulator-cell { border-right: none; padding: 10px 18px; color: #cbd5e1; }
    .tabulator .tabulator-header .tabulator-col .tabulator-arrow { border-top-color: #4a5568; border-bottom-color: #4a5568; }
    .tabulator-col-title { color: #64748b; }
    .tabulator .tabulator-calcs-bottom .tabulator-cell { background: #151922; color: #f8fafc; font-weight: 600; border-top: 2px solid #2d3748; }
  </style>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 { font-size: 1.4rem; font-weight: 600; color: #f8fafc; }

    #total-card {
      background: #1e2433;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 16px 24px;
      text-align: right;
    }
    #total-card .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; }
    #total-card .amount { font-size: 1.8rem; font-weight: 700; color: #38bdf8; }

    #refresh-btn {
      background: #1e40af;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background .2s;
    }
    #refresh-btn:hover { background: #2563eb; }
    #refresh-btn:disabled { background: #374151; cursor: default; }

    #collapse-btn {
      background: #1e2433;
      color: #94a3b8;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background .2s;
    }
    #collapse-btn:hover { background: #253047; color: #e2e8f0; }

    #last-updated { font-size: 0.75rem; color: #64748b; margin-top: 4px; }

    .owner-section { margin-bottom: 32px; }
    .owner-title {
      font-size: 1rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .account-card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .account-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
      background: #1e2433;
    }
    .account-header:hover { background: #253047; }

    .account-name { font-weight: 600; font-size: 0.95rem; }
    .account-number { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
    .account-balance { font-size: 1.1rem; font-weight: 700; color: #4ade80; }
    .chevron { color: #64748b; font-size: 0.8rem; transition: transform .2s; }
    .chevron.open { transform: rotate(180deg); }

    .positions-table { width: 100%; display: none; }
    .positions-table.open { display: table; }

    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      background: #151922;
      color: #64748b;
      font-weight: 500;
      text-align: left;
      padding: 10px 18px;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: .05em;
    }
    th.right, td.right { text-align: right; }
    td { padding: 10px 18px; border-top: 1px solid #1e2433; color: #cbd5e1; }
    tr:hover td { background: #1e2433; }

    .ticker { font-weight: 600; color: #f8fafc; }
    .usd { color: #fbbf24; font-size: 0.7rem; margin-left: 4px; }

    #error { color: #f87171; text-align: center; padding: 40px; display: none; }
    #loading { text-align: center; padding: 60px; color: #64748b; display: none; }

    #col-toggle { position: relative; }
    #cols-btn {
      background: #1e2433; color: #94a3b8; border: 1px solid #2d3748;
      border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 0.85rem;
      transition: background .2s;
    }
    #cols-btn:hover { background: #253047; color: #e2e8f0; }
    #col-panel {
      display: none; position: absolute; right: 0; top: calc(100% + 6px);
      background: #1e2433; border: 1px solid #2d3748; border-radius: 10px;
      padding: 10px 14px; z-index: 100; min-width: 160px;
      display: none; flex-direction: column; gap: 8px;
    }
    #col-panel.open { display: flex; }
    #col-panel label { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: #cbd5e1; cursor: pointer; white-space: nowrap; }
    #col-panel input[type=checkbox] { accent-color: #3b82f6; cursor: pointer; }
    #col-panel-close { align-self: flex-end; background: none; border: none; color: #94a3b8; font-size: 1rem; cursor: pointer; padding: 0; line-height: 1; }
    #col-panel-close:hover { color: #e2e8f0; }

    #rate-card {
      background: #1e2433;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 12px 20px;
      text-align: center;
    }
    #rate-card .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    #usdcad-rate {
      background: transparent;
      border: none;
      border-bottom: 1px solid #4a5568;
      color: #fbbf24;
      font-size: 1.2rem;
      font-weight: 700;
      width: 70px;
      text-align: center;
      outline: none;
    }

    .table-card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      overflow: hidden;
    }

    @media (max-width: 480px) {
      th.hide-mobile, td.hide-mobile { display: none; }
      .amount { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Portfolio Dashboard</h1>
    <div id="last-updated"></div>
  </div>
  <div id="total-card">
    <div class="label">Total Portfolio</div>
    <div class="amount" id="total-value">—</div>
  </div>
  <div id="rate-card">
    <div class="label">USD/CAD</div>
    <input id="usdcad-rate" type="number" step="0.001" value="1.38">
  </div>
  <div id="col-toggle">
    <button id="cols-btn" onclick="toggleColPanel()">Columns</button>
    <div id="col-panel"></div>
  </div>
  <button id="collapse-btn" onclick="toggleTable()">Hide</button>
  <button id="refresh-btn" onclick="load()">Refresh</button>
</header>

<div id="loading">Loading portfolio data...</div>
<div id="error">Failed to load data. Is the server running?</div>
<div id="accounts"></div>

<script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
<script>
  // ============================================================
  // PHONE CONFIG — edit this to control what shows on phone (≤390px)
  // ============================================================
  const PHONE = {
    hiddenCols: ['description', 'rejRRSP', 'rejTFSA', 'kazRRSP', 'kazTFSA', 'nativePrice'],
    hiddenElements: ['#cols-btn'],
  };
  // ============================================================

  let portfolioTable = null;

  const LS_COLS   = 'portfolio_col_visibility';
  const LS_HIDDEN = 'portfolio_table_hidden';

  function saveColVisibility() {
    const state = {};
    portfolioTable.getColumns().forEach(col => {
      const field = col.getField();
      if (field) state[field] = col.isVisible();
    });
    localStorage.setItem(LS_COLS, JSON.stringify(state));
  }

  function loadColVisibility() {
    try { return JSON.parse(localStorage.getItem(LS_COLS)) || {}; } catch { return {}; }
  }

  async function load() {
    const btn = document.getElementById('refresh-btn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');

    btn.disabled = true;
    btn.textContent = 'Loading…';
    loading.style.display = 'block';
    error.style.display = 'none';
    if (portfolioTable) { portfolioTable.destroy(); portfolioTable = null; }

    try {
      const res = await fetch('/api/portfolio');
      if (!res.ok) throw new Error(res.statusText);
      const data = await res.json();
      render(data);
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString();
      reflowTable();
    } catch (e) {
      error.style.display = 'block';
    } finally {
      loading.style.display = 'none';
      btn.disabled = false;
      btn.textContent = 'Refresh';
    }
  }

  function fmt(amount, currency, decimals = 2) {
    return new Intl.NumberFormat('en-CA', {
      style: 'currency', currency: currency || 'CAD', maximumFractionDigits: decimals, minimumFractionDigits: decimals
    }).format(amount);
  }

  function render(data) {
    document.getElementById('total-value').textContent = fmt(data.total_cad, 'CAD', 0);

    const COLS = ['Rej RRSP', 'Rej TFSA', 'Kaz RRSP', 'Kaz TFSA'];
    const FIELDS = ['rejRRSP', 'rejTFSA', 'kazRRSP', 'kazTFSA'];

    function acctLabel(acc) {
      const name = acc.name.toUpperCase();
      const type = name.includes('RRSP') ? 'RRSP' : name.includes('TFSA') ? 'TFSA' : acc.name;
      return `${acc.owner} ${type}`;
    }

    const rate = parseFloat(document.getElementById('usdcad-rate').value) || 1.38;
    const toCAD = info => info.currency === 'USD' ? (info.price || 0) * rate : (info.price || 0);

    const combined = {};
    for (const acc of data.accounts) {
      const label = acctLabel(acc);
      for (const pos of acc.positions) {
        if (!combined[pos.ticker]) {
          combined[pos.ticker] = { description: pos.description, currency: pos.currency, price: pos.price, qtys: {} };
        }
        combined[pos.ticker].qtys[label] = (combined[pos.ticker].qtys[label] || 0) + pos.units;
      }
    }

    const tableData = Object.entries(combined).map(([ticker, info]) => {
      const totalQty = Object.values(info.qtys).reduce((s, u) => s + u, 0);
      const cp = toCAD(info);
      const row = { ticker, isUSD: info.currency === 'USD', description: info.description, currency: info.currency, totalQty, nativePrice: info.price, cadPriceVal: cp, value: totalQty * cp };
      COLS.forEach((col, i) => { row[FIELDS[i]] = info.qtys[col] || null; });
      return row;
    });

    const qtyFmt = cell => {
      const { isUSD } = cell.getRow().getData();
      const v = cell.getValue();
      return v ? v.toFixed(isUSD ? 3 : 0) : '';
    };

    const savedCols = loadColVisibility();
    portfolioTable = new Tabulator('#accounts', {
      data: tableData,
      layout: 'fitColumns',
      initialSort: [{ column: 'value', dir: 'desc' }],

      columns: [
        {
          title: 'Ticker', field: 'ticker', widthGrow: 0, widthShrink: 0,
          visible: savedCols['ticker'] !== false,
          formatter: cell => {
            const { isUSD } = cell.getRow().getData();
            return isUSD ? `${cell.getValue()} <span class="usd">USD</span>` : cell.getValue();
          },
          bottomCalc: () => 'TOTAL',
        },
        { title: 'Description', field: 'description', widthGrow: 3, visible: savedCols['description'] !== false },
        ...COLS.map((col, i) => ({
          title: col, field: FIELDS[i],
          hozAlign: 'right', headerHozAlign: 'right', sorter: 'number', formatter: qtyFmt,
          visible: savedCols[FIELDS[i]] !== false,
        })),
        {
          title: 'Total Qty', field: 'totalQty',
          hozAlign: 'right', headerHozAlign: 'right', sorter: 'number',
          visible: savedCols['totalQty'] !== false,
          formatter: cell => { const { isUSD } = cell.getRow().getData(); return cell.getValue().toFixed(isUSD ? 3 : 0); }
        },
        {
          title: 'Native Price', field: 'nativePrice',
          hozAlign: 'right', headerHozAlign: 'right', sorter: 'number',
          visible: savedCols['nativePrice'] !== false,
          formatter: cell => fmt(cell.getValue(), cell.getRow().getData().currency).replace(/^US\$/, '$'),
        },
        {
          title: 'CAD Price', field: 'cadPriceVal',
          hozAlign: 'right', headerHozAlign: 'right', sorter: 'number',
          visible: savedCols['cadPriceVal'] !== false,
          formatter: cell => fmt(cell.getValue(), 'CAD'),
        },
        {
          title: 'Value', field: 'value',
          hozAlign: 'right', headerHozAlign: 'right', sorter: 'number',
          visible: savedCols['value'] !== false,
          formatter: cell => fmt(cell.getValue(), 'CAD', 0),
          bottomCalc: 'sum',
          bottomCalcFormatter: cell => fmt(cell.getValue(), 'CAD', 0),
        },
      ],
      tableBuilt: function() {
        const col = this.getColumn('ticker');
        const w = Math.max(...[col.getElement(), ...col.getCells().map(c => c.getElement())].map(el => el.scrollWidth));
        col.setWidth(w);
      },
    });
    setTimeout(() => {
      buildColPanel();
      // Restore hide/show state
      if (localStorage.getItem(LS_HIDDEN) === 'true') {
        document.getElementById('accounts').style.display = 'none';
        document.getElementById('collapse-btn').textContent = 'Show';
      }
    }, 0);

  }

  function buildColPanel(tbl) {
    const table = tbl || portfolioTable;
    const panel = document.getElementById('col-panel');
    panel.innerHTML = '';
    const closeBtn = document.createElement('button');
    closeBtn.id = 'col-panel-close';
    closeBtn.textContent = '✕';
    closeBtn.onclick = () => {
      panel.classList.remove('open');
      reflowTable();
    };
    panel.appendChild(closeBtn);
    table.getColumns().forEach(col => {
      const field = col.getField();
      const title = col.getDefinition().title;
      if (!field || !title) return;
      const label = document.createElement('label');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = col.isVisible();
      cb.onchange = () => { col.toggle(); saveColVisibility(); };
      label.appendChild(cb);
      label.appendChild(document.createTextNode(' ' + title));
      panel.appendChild(label);
    });
  }

  function toggleTable() {
    const el = document.getElementById('accounts');
    const btn = document.getElementById('collapse-btn');
    const collapsed = el.style.display === 'none';
    el.style.display = collapsed ? '' : 'none';
    btn.textContent = collapsed ? 'Hide' : 'Show';
    localStorage.setItem(LS_HIDDEN, String(!collapsed));
  }

  function reflowTable() {
    const el = document.getElementById('accounts');
    el.style.display = 'none';
    setTimeout(() => { el.style.display = ''; }, 0);
  }

  function toggleColPanel() {
    document.getElementById('col-panel').classList.toggle('open');
  }

  document.addEventListener('click', e => {
    const toggle = document.getElementById('col-toggle');
    if (toggle && !toggle.contains(e.target)) {
      document.getElementById('col-panel').classList.remove('open');
    }
  });

  (function applyPhoneStyles() {
    const colRules = PHONE.hiddenCols.map(f =>
      `.tabulator-col[tabulator-field="${f}"], .tabulator-cell[tabulator-field="${f}"]`
    ).join(', ');
    const elRules = PHONE.hiddenElements.join(', ');
    const rules = [colRules, elRules].filter(Boolean).join(', ');
    if (!rules) return;
    const style = document.createElement('style');
    style.textContent = `@media (max-width: 390px) { ${rules} { display: none !important; } }`;
    document.head.appendChild(style);
  })();

  load();
</script>
</body>
</html>
